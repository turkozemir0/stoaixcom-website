<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — STOAIX</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background: #f5f8ff; }

    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-nav {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
    }
    .auth-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .auth-nav-logo img { height: 28px; }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .auth-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(37,99,235,0.07);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .auth-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-1);
      margin-bottom: 8px;
    }
    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-2);
      line-height: 1.5;
    }

    .auth-form { display: flex; flex-direction: column; gap: 18px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-1);
    }
    .form-input {
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text-1);
      background: var(--bg-2);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .form-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
      background: #fff;
    }
    .form-input::placeholder { color: #9aabcc; }

    .btn-auth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.15s;
      font-family: inherit;
      text-decoration: none;
      margin-top: 4px;
    }
    .btn-auth:hover:not(:disabled) { background: var(--blue-h); transform: translateY(-1px); }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #dc2626;
      display: none;
      text-align: center;
    }
    .auth-error-banner.visible { display: block; }

    .auth-success-msg {
      background: rgba(22,163,74,0.06);
      border: 1.5px solid rgba(22,163,74,0.25);
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 0.875rem;
      color: #15803d;
      text-align: center;
      line-height: 1.5;
      display: none;
    }
    .auth-success-msg.visible { display: block; }

    .password-hint {
      font-size: 0.78rem;
      color: var(--text-2);
      margin-top: 2px;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
    }
  </style>
</head>
<body class="auth-page">

  <nav class="auth-nav">
    <div class="auth-nav-inner">
      <a href="index.html" class="auth-nav-logo">
        <img loading="lazy" decoding="async" src="assets/logo-iconwithname.svg" alt="STOAIX" />
      </a>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-title">Set new password</div>
        <div class="auth-subtitle">Enter your new password below.</div>
      </div>

      <div class="auth-error-banner" id="errorBanner"></div>
      <div class="auth-success-msg" id="successMsg">
        Password updated successfully! Redirecting to login…
      </div>

      <form class="auth-form" id="resetForm">
        <div class="form-group">
          <label class="form-label" for="password">New password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" />
          <div class="password-hint">Must be at least 8 characters</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <input class="form-input" type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required minlength="8" autocomplete="new-password" />
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">
          Update password
        </button>
      </form>
    </div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://ablntzdbsrzbqyrnfwpl.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFibG50emRic3J6YnF5cm5md3BsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDA5NjYsImV4cCI6MjA4OTQxNjk2Nn0._liCLJqZ2z0WpMcAH_PiKVxJAbjH5BpY2HRx02itsUI'

  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  const resetForm = document.getElementById('resetForm')
  const submitBtn = document.getElementById('submitBtn')
  const errorBanner = document.getElementById('errorBanner')
  const successMsg = document.getElementById('successMsg')

  // Parse token from URL hash (Supabase sends: #access_token=...&refresh_token=...&type=recovery)
  async function init() {
    const hash = window.location.hash.substring(1)
    const params = new URLSearchParams(hash)
    const accessToken = params.get('access_token')
    const refreshToken = params.get('refresh_token')
    const type = params.get('type')

    if (!accessToken || type !== 'recovery') {
      errorBanner.textContent = 'Invalid or expired reset link. Please request a new one.'
      errorBanner.classList.add('visible')
      resetForm.style.display = 'none'
      return
    }

    // Set the session from the recovery token
    const { error } = await sb.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken,
    })

    if (error) {
      errorBanner.textContent = 'This reset link has expired. Please request a new one.'
      errorBanner.classList.add('visible')
      resetForm.style.display = 'none'
    }
  }

  init()

  resetForm.addEventListener('submit', async function(e) {
    e.preventDefault()

    const password = document.getElementById('password').value
    const confirmPassword = document.getElementById('confirmPassword').value

    if (password !== confirmPassword) {
      errorBanner.textContent = 'Passwords do not match.'
      errorBanner.classList.add('visible')
      return
    }

    if (password.length < 8) {
      errorBanner.textContent = 'Password must be at least 8 characters.'
      errorBanner.classList.add('visible')
      return
    }

    submitBtn.disabled = true
    submitBtn.textContent = 'Updating…'
    errorBanner.classList.remove('visible')

    try {
      const { error } = await sb.auth.updateUser({ password })

      if (error) {
        errorBanner.textContent = error.message || 'Failed to update password. Please try again.'
        errorBanner.classList.add('visible')
        submitBtn.disabled = false
        submitBtn.textContent = 'Update password'
        return
      }

      // Success
      resetForm.style.display = 'none'
      successMsg.classList.add('visible')

      setTimeout(() => {
        window.location.href = 'https://platform.stoaix.com/login'
      }, 2000)
    } catch (err) {
      errorBanner.textContent = 'Network error. Please try again.'
      errorBanner.classList.add('visible')
      submitBtn.disabled = false
      submitBtn.textContent = 'Update password'
    }
  })
</script>
<script defer src="js/i18n.js"></script>
</body>
</html>
