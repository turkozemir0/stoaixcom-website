<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — STOAIX</title>
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://stoaix.com/login">
  <meta name="author" content="Emir TÜRKÖZ, Ata Ulufer">
  <link rel="icon" type="image/png" href="/assets/images/logo.png">
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background: #f5f8ff; }

    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-nav {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
    }
    .auth-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .auth-nav-logo img { height: 28px; }
    .auth-nav-right {
      font-size: 0.875rem;
      color: var(--text-2);
    }
    .auth-nav-right a {
      color: var(--blue);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-nav-right a:hover { text-decoration: underline; }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .auth-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(37,99,235,0.07);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .auth-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-1);
      margin-bottom: 8px;
    }
    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-2);
    }

    .auth-form { display: flex; flex-direction: column; gap: 18px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-1);
    }
    .form-input {
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text-1);
      background: var(--bg-2);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .form-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
      background: #fff;
    }
    .form-input::placeholder { color: #9aabcc; }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .form-checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-2);
      cursor: pointer;
    }
    .form-checkbox-wrap input { accent-color: var(--blue); }
    .form-forgot {
      font-size: 0.85rem;
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
    }
    .form-forgot:hover { text-decoration: underline; }

    .btn-auth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.15s;
      font-family: inherit;
      text-decoration: none;
      margin-top: 4px;
    }
    .btn-auth:hover:not(:disabled) { background: var(--blue-h); transform: translateY(-1px); }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #dc2626;
      display: none;
      text-align: center;
    }
    .auth-error-banner.visible { display: block; }

    .auth-footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 0.85rem;
      color: var(--text-2);
    }
    .auth-footer-note a {
      color: var(--blue);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-footer-note a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
    }
  </style>

<body class="auth-page">

  <nav class="auth-nav">
    <div class="auth-nav-inner">
      <a href="index.html" class="auth-nav-logo">
        <img loading="lazy" decoding="async" src="assets/logo-iconwithname.svg" alt="STOAIX" />
      </a>
      <div class="auth-nav-right">
        Don't have an account? <a href="signup.html">Start free trial</a>
      </div>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-title">Welcome back</div>
        <div class="auth-subtitle">Log in to your STOAIX dashboard</div>
      </div>

      <div class="auth-error-banner" id="errorBanner"></div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Work email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <div class="form-row">
          <label class="form-checkbox-wrap">
            <input type="checkbox" name="remember" /> Remember me
          </label>
          <a href="forgot-password.html" class="form-forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-auth" id="loginBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
          </svg>
          Log in
        </button>
      </form>

      <div class="auth-footer-note">
        New to STOAIX? <a href="signup.html">Start your 3-day free trial</a>
      </div>
    </div>
  </main>

<script>
  const loginForm = document.getElementById('loginForm')
  const loginBtn = document.getElementById('loginBtn')
  const errorBanner = document.getElementById('errorBanner')

  loginForm.addEventListener('submit', async function(e) {
    e.preventDefault()
    loginBtn.disabled = true
    loginBtn.textContent = 'Logging in…'
    errorBanner.classList.remove('visible')

    const email = document.getElementById('email').value
    const password = document.getElementById('password').value

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      })

      const data = await res.json()

      if (!res.ok || !data.success) {
        errorBanner.textContent = data.error || 'Login failed. Please try again.'
        errorBanner.classList.add('visible')
        loginBtn.disabled = false
        loginBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> Log in'
        return
      }

      if (data.converted) {
        // User already has a subscription — redirect to platform
        window.location.href = data.redirect_url
      } else {
        // Not converted — store data and redirect to checkout
        const sd = data.signup_data
        sessionStorage.setItem('signup_data', JSON.stringify(sd))
        sessionStorage.setItem('email_verified', 'true')

        const params = new URLSearchParams({
          plan: sd.plan,
          billing: sd.billing,
          first_name: sd.firstName,
          last_name: sd.lastName,
          email: sd.email,
          company: sd.company,
          from: 'login',
        })
        window.location.href = 'checkout.html?' + params.toString()
      }
    } catch (err) {
      errorBanner.textContent = 'Network error. Please check your connection and try again.'
      errorBanner.classList.add('visible')
      loginBtn.disabled = false
      loginBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> Log in'
    }
  })
</script>
<script defer src="js/i18n.js"></script>
</body>
</html>
