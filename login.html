<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — STOAIX</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background: #f5f8ff; }

    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-nav {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
    }
    .auth-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .auth-nav-logo img { height: 28px; }
    .auth-nav-right {
      font-size: 0.875rem;
      color: var(--text-2);
    }
    .auth-nav-right a {
      color: var(--blue);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-nav-right a:hover { text-decoration: underline; }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .auth-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(37,99,235,0.07);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .auth-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-1);
      margin-bottom: 8px;
    }
    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-2);
    }

    .auth-form { display: flex; flex-direction: column; gap: 18px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-1);
    }
    .form-input {
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text-1);
      background: var(--bg-2);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .form-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
      background: #fff;
    }
    .form-input::placeholder { color: #9aabcc; }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .form-checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-2);
      cursor: pointer;
    }
    .form-checkbox-wrap input { accent-color: var(--blue); }
    .form-forgot {
      font-size: 0.85rem;
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
    }
    .form-forgot:hover { text-decoration: underline; }

    .btn-auth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.15s;
      font-family: inherit;
      text-decoration: none;
      margin-top: 4px;
    }
    .btn-auth:hover { background: var(--blue-h); transform: translateY(-1px); }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-divider span {
      font-size: 0.8rem;
      color: var(--text-2);
      white-space: nowrap;
    }

    .btn-oauth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 24px;
      background: #fff;
      color: var(--text-1);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.18s, box-shadow 0.18s;
      font-family: inherit;
      text-decoration: none;
    }
    .btn-oauth:hover {
      border-color: #bbc9e0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .auth-footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 0.85rem;
      color: var(--text-2);
    }
    .auth-footer-note a {
      color: var(--blue);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-footer-note a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
    }
  </style>
</head>
<body class="auth-page">

  <nav class="auth-nav">
    <div class="auth-nav-inner">
      <a href="index.html" class="auth-nav-logo">
        <img loading="lazy" decoding="async" src="assets/logo-iconwithname.svg" alt="STOAIX" />
      </a>
      <div class="auth-nav-right">
        Don't have an account? <a href="signup.html">Start free trial</a>
      </div>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-title">Welcome back</div>
        <div class="auth-subtitle">Log in to your STOAIX dashboard</div>
      </div>

      <form class="auth-form" action="#" method="POST">
        <div class="form-group">
          <label class="form-label" for="email">Work email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <div class="form-row">
          <label class="form-checkbox-wrap">
            <input type="checkbox" name="remember" /> Remember me
          </label>
          <a href="#" class="form-forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-auth">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
          </svg>
          Log in
        </button>

        <div class="auth-divider"><span>or continue with</span></div>

        <a href="#" class="btn-oauth">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </a>
      </form>

      <div class="auth-footer-note">
        New to STOAIX? <a href="signup.html">Start your 10-day free trial</a>
      </div>
    </div>
  </main>

<script defer src="js/i18n.js"></script>
</body>
</html>
