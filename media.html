<head>

  <link rel="icon" type="image/png" href="/assets/images/logo.png">
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <link rel="canonical" href="https://stoaix.com/media" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://stoaix.com/media" />
  <meta property="og:title" content="Media — STOAIX | Founders' LinkedIn Posts" />
  <meta property="og:description" content="Follow STOAIX founders Ata Ulufer (CEO) and Emir TÜRKÖZ (CTO) on LinkedIn. Latest posts, insights, and updates from our leadership team." />
  <meta property="og:site_name" content="STOAIX" />
  <meta property="og:image" content="https://stoaix.com/assets/images/logo.png" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Media — STOAIX",
    "description": "Follow STOAIX founders on LinkedIn. Latest posts, insights, and updates from our leadership team.",
    "url": "https://stoaix.com/media",
    "publisher": {
      "@type": "Organization",
      "name": "STOAIX",
      "url": "https://stoaix.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://stoaix.com/assets/images/logo.png"
      }
    }
  }

  <style>
    .media-hero {
      position: relative;
      overflow: hidden;
      padding: 148px 0 80px;
      background:
        radial-gradient(ellipse 70% 60% at 8% 20%,  rgba(37,99,235,0.28)  0%, transparent 55%),
        radial-gradient(ellipse 55% 50% at 90% 12%,  rgba(124,58,237,0.20) 0%, transparent 50%),
        radial-gradient(ellipse 50% 42% at 50% 95%,  rgba(59,130,246,0.15) 0%, transparent 50%),
        #f5f7ff;
    }
    .media-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(37,99,235,0.18) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.30;
      pointer-events: none;
      z-index: 0;
    }
    .media-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, transparent 55%, rgba(245,247,255,0.97) 100%),
        linear-gradient(to right, rgba(245,247,255,0.3) 0%, transparent 25%),
        linear-gradient(to left,  rgba(245,247,255,0.3) 0%, transparent 25%);
      pointer-events: none;
      z-index: 1;
    }
    .media-hero-inner {
      position: relative;
      z-index: 2;
      max-width: 780px;
      margin: 0 auto;
      text-align: center;
      padding: 0 24px;
    }
    .media-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(37,99,235,0.08);
      border: 1px solid rgba(37,99,235,0.18);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .media-hero-headline {
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 800;
      line-height: 1.10;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 24px;
    }
    .media-hero-headline em {
      font-style: normal;
      background: linear-gradient(135deg, var(--blue) 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .media-hero-sub {
      font-size: 1.15rem;
      color: var(--text-2);
      line-height: 1.65;
      max-width: 580px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <!-- Navbar (injected by components.js) -->
  <nav class="navbar" id="navbar"></nav>
  <div class="mobile-menu" id="mobileMenu"></div>

  <!-- ═══════════════════════════════════════════════
       HERO
  ═══════════════════════════════════════════════ -->
  <section class="media-hero">
    <div class="media-hero-inner reveal">
      <div class="media-eyebrow">Media</div>
      <h1 class="media-hero-headline">Founders' <em>LinkedIn Posts</em></h1>
      <p class="media-hero-sub">
        Stay up to date with the latest insights, updates, and thought leadership from the STOAIX founding team.
      </p>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════
       FOUNDERS
  ═══════════════════════════════════════════════ -->
  <section class="founders-section" id="founders">
    <div class="container reveal">
      <h2 class="founders-headline">Founders' LinkedIn Posts</h2>
      <div class="founders-grid">
        <div class="founder-card">
          <div class="founder-info">
            <h3 class="founder-name">Ata Ulufer</h3>
            <span class="founder-title">Co-founder & CEO</span>
            <a href="https://www.linkedin.com/in/ata-ulufer-stoaix/" class="founder-linkedin" target="_blank" rel="noopener">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
              Follow on LinkedIn
            </a>
          </div>
          <div class="founder-embed">
            <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:share:7462170173500907520" height="400" width="100%" frameborder="0" allowfullscreen loading="lazy" title="Ata Ulufer LinkedIn post"></iframe>
          </div>
        </div>
        <div class="founder-card">
          <div class="founder-info">
            <h3 class="founder-name">Emir TÜRKÖZ</h3>
            <span class="founder-title">Co-founder & CTO</span>
            <a href="https://www.linkedin.com/in/emir-t%C3%BCrk%C3%B6z/" class="founder-linkedin" target="_blank" rel="noopener">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
              Follow on LinkedIn
            </a>
          </div>
          <div class="founder-embed">
            <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7460720614274781184" height="400" width="100%" frameborder="0" allowfullscreen loading="lazy" title="Emir TÜRKÖZ LinkedIn post"></iframe>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════════ -->
  <footer class="footer"></footer>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/i18n.js"></script>

</body>
</html>
