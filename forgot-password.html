<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — STOAIX</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background: #f5f8ff; }

    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-nav {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
    }
    .auth-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .auth-nav-logo img { height: 28px; }
    .auth-nav-right {
      font-size: 0.875rem;
      color: var(--text-2);
    }
    .auth-nav-right a {
      color: var(--blue);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-nav-right a:hover { text-decoration: underline; }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .auth-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(37,99,235,0.07);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .auth-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-1);
      margin-bottom: 8px;
    }
    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-2);
      line-height: 1.5;
    }

    .auth-form { display: flex; flex-direction: column; gap: 18px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-1);
    }
    .form-input {
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text-1);
      background: var(--bg-2);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .form-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
      background: #fff;
    }
    .form-input::placeholder { color: #9aabcc; }

    .btn-auth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.15s;
      font-family: inherit;
      text-decoration: none;
      margin-top: 4px;
    }
    .btn-auth:hover:not(:disabled) { background: var(--blue-h); transform: translateY(-1px); }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-success-msg {
      background: rgba(22,163,74,0.06);
      border: 1.5px solid rgba(22,163,74,0.25);
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 0.875rem;
      color: #15803d;
      text-align: center;
      line-height: 1.5;
      display: none;
    }
    .auth-success-msg.visible { display: block; }

    .auth-back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      font-size: 0.85rem;
      color: var(--text-2);
      text-decoration: none;
    }
    .auth-back-link:hover { color: var(--text-1); }

    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
    }
  </style>

</head>
<body class="auth-page">

  <nav class="auth-nav">
    <div class="auth-nav-inner">
      <a href="index.html" class="auth-nav-logo">
        <img loading="lazy" decoding="async" src="assets/logo-iconwithname.svg" alt="STOAIX" />
      </a>
      <div class="auth-nav-right">
        Remember your password? <a href="login.html">Log in</a>
      </div>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-title">Reset your password</div>
        <div class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</div>
      </div>

      <div class="auth-success-msg" id="successMsg">
        If an account exists with that email, we've sent a password reset link. Please check your inbox.
      </div>

      <form class="auth-form" id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Work email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" />
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">
          Send reset link
        </button>
      </form>

      <a href="login.html" class="auth-back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to login
      </a>
    </div>
  </main>

<script>
  const forgotForm = document.getElementById('forgotForm')
  const submitBtn = document.getElementById('submitBtn')
  const successMsg = document.getElementById('successMsg')

  forgotForm.addEventListener('submit', async function(e) {
    e.preventDefault()
    submitBtn.disabled = true
    submitBtn.textContent = 'Sending…'

    try {
      await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value }),
      })
    } catch (err) {
      // Ignore errors — always show success
    }

    // Always show success message
    successMsg.classList.add('visible')
    forgotForm.style.display = 'none'
  })
</script>
<script defer src="js/i18n.js"></script>
</body>
</html>
